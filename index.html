<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0E" />
    <title>TroyStack</title>
    <meta name="description" content="Track your precious metals portfolio — gold, silver, platinum, palladium." />
    <meta property="og:site_name" content="TroyStack" />
    <meta property="og:title" content="TroyStack" />
    <meta property="og:description" content="Track your precious metals portfolio — gold, silver, platinum, palladium." />
    <meta property="og:image" content="/troy-avatar.png" />
    <meta property="og:type" content="website" />
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('stacktracker_theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (!dark) document.documentElement.classList.remove('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
